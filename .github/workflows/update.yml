name: Weekly update & deploy

# Runs every Monday 06:00 UTC (~07:00/08:00 Skopje depending on DST),
# and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scraper/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write   # to commit refreshed listings.json
  pages: write      # to deploy to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        # Never fail the whole run on a transient scrape error; main.py
        # exits non-zero only if it produced ZERO listings.
        run: python -m scraper.main

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/listings.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
